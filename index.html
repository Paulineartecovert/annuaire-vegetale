<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuaire de la Couleur Végétale</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --vert: #4a7c59; --vert-clair: #7aad8a; --vert-pale: #eef4f0; --gris: #6b7280; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #2d5a3d 0%, #4a7c59 50%, #7aad8a 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .box {
    background: white; border-radius: 24px; padding: 44px; width: 100%;
    max-width: 440px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); margin: 20px;
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo .icon { font-size: 52px; display: block; margin-bottom: 14px; }
  .logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--vert); }
  .logo p { font-size: 0.88rem; color: var(--gris); margin-top: 6px; line-height: 1.5; }
  .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 26px; }
  .tab {
    flex: 1; padding: 12px; text-align: center; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; color: var(--gris);
    border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s;
  }
  .tab.active { color: var(--vert); border-bottom-color: var(--vert); }
  .form { display: none; }
  .form.active { display: block; }
  .group { margin-bottom: 18px; }
  .group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
  .group input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb;
    border-radius: 10px; font-size: 0.92rem; outline: none; transition: border 0.2s;
  }
  .group input:focus { border-color: var(--vert); box-shadow: 0 0 0 3px rgba(74,124,89,0.1); }
  .btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--vert), #2d5a3d);
    color: white; border: none; border-radius: 10px; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,124,89,0.35); }
  .msg { font-size: 0.83rem; text-align: center; margin-top: 12px; min-height: 20px; padding: 8px; border-radius: 8px; }
  .msg.error { background: #fef2f2; color: #dc2626; }
  .msg.success { background: var(--vert-pale); color: var(--vert); }
  .divider { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--gris); }
  .divider a { color: var(--vert); font-weight: 600; text-decoration: none; }
  .public-link {
    margin-top: 24px; padding: 16px; background: var(--vert-pale);
    border-radius: 12px; text-align: center;
  }
  .public-link p { font-size: 0.82rem; color: var(--gris); margin-bottom: 8px; }
  .public-link a {
    display: inline-block; color: var(--vert); font-weight: 700;
    font-size: 0.88rem; text-decoration: none;
  }
  .public-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <span class="icon">🌿</span>
    <h1>Couleur Végétale</h1>
    <p>Annuaire des acteurs en France<br>Connectez-vous pour accéder à la carte</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Se connecter</div>
    <div class="tab" onclick="switchTab('signup')">Créer un compte</div>
  </div>

  <!-- LOGIN -->
  <div class="form active" id="form-login">
    <div class="group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.fr">
    </div>
    <div class="group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') handleLogin()">
    </div>
    <button class="btn" onclick="handleLogin()">Accéder à l'annuaire →</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP -->
  <div class="form" id="form-signup">
    <div class="group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="votre@email.fr">
    </div>
    <div class="group">
      <label>Mot de passe</label>
      <input type="password" id="signup-password" placeholder="Minimum 6 caractères">
    </div>
    <div class="group">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="signup-password2" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') handleSignup()">
    </div>
    <button class="btn" onclick="handleSignup()">Créer mon compte →</button>
    <div class="msg" id="signup-msg"></div>
  </div>

  <div class="public-link">
    <p>Vous souhaitez rejoindre l'annuaire ?</p>
    <a href="/inscription.html">📝 Remplir le formulaire d'inscription →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dcrkzffhdwznmqokpkla.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_aGwqEVzgOpuYi8bwaIvtLQ_boPAghjd';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si déjà connecté → rediriger vers l'annuaire
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/annuaire.html';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-signup').classList.toggle('active', tab==='signup');
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    msg.className = 'msg'; msg.textContent = 'Connexion…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      msg.className = 'msg error'; msg.textContent = '❌ Email ou mot de passe incorrect.';
    } else {
      msg.className = 'msg success'; msg.textContent = '✅ Connexion réussie !';
      setTimeout(() => window.location.href = '/annuaire.html', 800);
    }
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value.trim();
    const p1 = document.getElementById('signup-password').value;
    const p2 = document.getElementById('signup-password2').value;
    const msg = document.getElementById('signup-msg');
    if (p1 !== p2) { msg.className = 'msg error'; msg.textContent = '❌ Les mots de passe ne correspondent pas.'; return; }
    if (p1.length < 6) { msg.className = 'msg error'; msg.textContent = '❌ Mot de passe trop court (6 caractères minimum).'; return; }
    msg.className = 'msg'; msg.textContent = 'Création du compte…';
    const { error } = await sb.auth.signUp({ email, password: p1 });
    if (error) { msg.className = 'msg error'; msg.textContent = '❌ ' + error.message; }
    else {
      msg.className = 'msg success'; msg.textContent = '✅ Compte créé ! Redirection…';
      setTimeout(() => window.location.href = '/annuaire.html', 1000);
    }
  }
</script>
</body>
</html>
