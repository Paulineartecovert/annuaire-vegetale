<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuaire de la Couleur Végétale</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --vert: #4a7c59; --vert-clair: #7aad8a; --vert-pale: #eef4f0; --beige: #f5f0e8; --gris: #6b7280; --ombre: 0 4px 20px rgba(0,0,0,0.08); }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--beige); color: #2d2d2d; min-height: 100vh; }
  header { background: linear-gradient(135deg, var(--vert) 0%, #2d5a3d 100%); color: white; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-logo .icon { font-size: 26px; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header p { font-size: 0.76rem; opacity: 0.8; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-info { font-size: 0.8rem; opacity: 0.85; }
  .btn-logout { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn-logout:hover { background: rgba(255,255,255,0.25); }

  .carte-layout { display: flex; height: calc(100vh - 64px); }
  #map { flex: 1; z-index: 1; }
  .sidebar { width: 320px; background: white; overflow-y: auto; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; background: var(--vert-pale); }
  .sidebar-header h3 { font-size: 0.88rem; font-weight: 700; color: var(--vert); margin-bottom: 8px; }
  .search-box { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.84rem; outline: none; margin-bottom: 6px; }
  .search-box:focus { border-color: var(--vert); }
  .filter-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .filter-tag { padding: 3px 9px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s; }
  .count-badge { font-size: 0.78rem; font-weight: 600; color: var(--gris); padding: 7px 16px; background: var(--vert-pale); border-bottom: 1px solid #e5e7eb; text-align: center; }
  .acteurs-list { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
  .acteur-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.2s; border-left: 4px solid var(--vert); }
  .acteur-card:hover { box-shadow: 0 4px 12px rgba(74,124,89,0.15); transform: translateY(-1px); }
  .acteur-card.selected { background: var(--vert-pale); }
  .acteur-name { font-weight: 700; font-size: 0.87rem; margin-bottom: 3px; }
  .acteur-meta { font-size: 0.74rem; color: var(--gris); margin-bottom: 5px; }
  .acteur-tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; margin-right: 3px; margin-bottom: 2px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--gris); font-size: 0.85rem; }
  .loading { text-align: center; padding: 40px 20px; color: var(--gris); }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: var(--vert); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) { .carte-layout { flex-direction: column; height: auto; } #map { height: 50vh; } .sidebar { width: 100%; height: 45vh; } header { padding: 12px 16px; } }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <span class="icon">🌿</span>
    <div>
      <h1>Annuaire de la Couleur Végétale</h1>
      <p>Carte interactive des acteurs de la couleur végétale</p>
    </div>
  </div>
  <div class="header-right">
    <span class="user-info" id="user-email"></span>
    <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
  </div>
</header>

<div class="carte-layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔍 Rechercher</h3>
      <input class="search-box" type="text" id="search-nom" placeholder="Nom, description…" oninput="renderAll()">
      <input class="search-box" type="text" id="search-ville" placeholder="Ville…" oninput="renderAll()">
      <select id="filter-select" onchange="setFilter(this.value)" style="width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.84rem;outline:none;background:white;color:#2d2d2d;cursor:pointer;">
        <option value="Tous">🌿 Toutes les activités</option>
        <option value="Agricultrice tinctoriale">🌾 Agricultrice tinctoriale</option>
        <option value="Jardinière tinctoriale">🌱 Jardinière tinctoriale</option>
        <option value="Productrice de fibres naturelles">🪢 Productrice de fibres naturelles</option>
        <option value="Extracteur de colorants végétaux">🧪 Extracteur de colorants végétaux</option>
        <option value="Producteur de pigments végétaux">🎨 Producteur de pigments végétaux</option>
        <option value="Teinturière">🪣 Teinturière</option>
        <option value="Ennoblisseur">🧵 Ennoblisseur</option>
        <option value="Artisane savonnière">🧼 Artisane savonnière</option>
        <option value="Autres cosmétiques que savons">🌸 Autres cosmétiques que savons</option>
        <option value="Artiste utilisant la couleur végétale">🎭 Artiste utilisant la couleur végétale</option>
        <option value="Beaux-arts : Encres / Enluminure / Peinture naturelle">🖌️ Beaux-arts : Encres / Enluminure / Peinture naturelle</option>
        <option value="Tisserande / fileuse / tricoteuse">🧶 Tisserande / fileuse / tricoteuse</option>
        <option value="Créatrice mode / styliste">👗 Créatrice mode / styliste</option>
        <option value="Marque">🏷️ Marque</option>
        <option value="Formatrice / Centre de formation">📚 Formatrice / Centre de formation</option>
        <option value="Chercheuse / scientifique">🔬 Chercheuse / scientifique</option>
        <option value="Historienne / Ethnobotaniste / Archéologue">📜 Historienne / Ethnobotaniste / Archéologue</option>
        <option value="Médiatrice / animatrice tinctoriale">🤝 Médiatrice / animatrice tinctoriale</option>
        <option value="Association">🫂 Association</option>
        <option value="Autres ressources colorantes (Cochenille, Ocres...)">🌈 Autres ressources colorantes</option>
        <option value="Autre">✏️ Autre</option>
      </select>
    </div>
    <div class="count-badge" id="count-badge">Chargement…</div>
    <div class="acteurs-list" id="acteurs-list">
      <div class="loading"><div class="spinner"></div><br>Chargement de l'annuaire…</div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dcrkzffhdwznmqokpkla.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjcmt6ZmZoZHd6bm1xb2twa2xhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTA1ODQsImV4cCI6MjA5NjY2NjU4NH0.q3mlZ3tcX1OO4pNOaP70zxZFnxvzBdmKT8EOY5WXfhc';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let map, markers = [], acteurs = [], selectedId = null, activeFilter = 'Tous';

  // Pictos par métier
  const metierPictos = {
    'Agricultrice tinctoriale': '🌾',
    'Jardinière tinctoriale': '🌱',
    'Productrice de fibres naturelles': '🪢',
    'Extracteur de colorants végétaux': '🧪',
    'Producteur de pigments végétaux': '🎨',
    'Teinturière': '🪣',
    'Ennoblisseur': '🧵',
    'Artisane savonnière': '🧼',
    'Autres cosmétiques que savons': '🌸',
    'Artiste utilisant la couleur végétale': '🎭',
    'Beaux-arts : Encres / Enluminure / Peinture naturelle': '🖌️',
    'Tisserande / fileuse / tricoteuse': '🧶',
    'Créatrice mode / styliste': '👗',
    'Marque': '🏷️',
    'Formatrice / Centre de formation': '📚',
    'Chercheuse / scientifique': '🔬',
    'Historienne / Ethnobotaniste / Archéologue': '📜',
    'Médiatrice / animatrice tinctoriale': '🤝',
    'Association': '🫂',
    'Autres ressources colorantes (Cochenille, Ocres...)': '🌈',
  };

  const categories = ['Tous','Agricultrice tinctoriale','Jardinière tinctoriale','Productrice de fibres naturelles','Extracteur de colorants végétaux','Producteur de pigments végétaux','Teinturière','Ennoblisseur','Artisane savonnière','Autres cosmétiques que savons','Artiste utilisant la couleur végétale','Beaux-arts : Encres / Enluminure / Peinture naturelle','Tisserande / fileuse / tricoteuse','Créatrice mode / styliste','Marque','Formatrice / Centre de formation','Chercheuse / scientifique','Historienne / Ethnobotaniste / Archéologue','Médiatrice / animatrice tinctoriale','Association','Autres ressources colorantes (Cochenille, Ocres...)','Autre'];

  const catColors = {
    'Tous':'#4a7c59','Agricultrice tinctoriale':'#5a8a3a','Jardinière tinctoriale':'#3d7a3d',
    'Productrice de fibres naturelles':'#8a6a2a','Extracteur de colorants végétaux':'#6a5a8a',
    'Producteur de pigments végétaux':'#8a3a6a','Teinturière':'#4a7c59','Ennoblisseur':'#2d5a6a',
    'Artisane savonnière':'#8a6a5a','Autres cosmétiques que savons':'#7a5a8a',
    'Artiste utilisant la couleur végétale':'#8a4a3a','Beaux-arts : Encres / Enluminure / Peinture naturelle':'#5a3a8a',
    'Tisserande / fileuse / tricoteuse':'#3a6a8a','Créatrice mode / styliste':'#8a3a5a',
    'Marque':'#5a6a3a','Formatrice / Centre de formation':'#3a5a8a',
    'Chercheuse / scientifique':'#6a3a3a','Historienne / Ethnobotaniste / Archéologue':'#7a5a3a',
    'Médiatrice / animatrice tinctoriale':'#3a8a6a','Association':'#6a8a3a',
    'Autres ressources colorantes (Cochenille, Ocres...)':'#8a7a3a','Autre':'#6b7280'
  };

  sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) { window.location.href = '/index.html'; return; }
    document.getElementById('user-email').textContent = session.user.email;
    initMap();
    loadActeurs();
  });

  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = '/index.html';
  }

  function initMap() {
    map = L.map('map').setView([46.5, 2.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18
    }).addTo(map);
  }

  async function loadActeurs() {
    const { data, error } = await sb.from('acteurs').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    acteurs = data || [];
    renderAll();
  }

  function getPicto(activites) {
    if (!activites || activites.length === 0) return '🌿';
    for (const a of activites) {
      if (metierPictos[a]) return metierPictos[a];
      if (a.startsWith('Autre')) return '✏️';
    }
    return '🌿';
  }

  function createIcon(couleur, picto) {
    return L.divIcon({
      className: '',
      html: `<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${couleur};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px;">${picto}</span></div>`,
      iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -38]
    });
  }

  function getFiltered() {
    const sNom = (document.getElementById('search-nom')?.value || '').toLowerCase();
    const sVille = (document.getElementById('search-ville')?.value || '').toLowerCase();
    return acteurs.filter(a => {
      const matchFilter = activeFilter === 'Tous' || (a.activites && a.activites.some(act => act.includes(activeFilter)));
      const matchNom = !sNom || (a.nom||'').toLowerCase().includes(sNom) || (a.prenom||'').toLowerCase().includes(sNom)
        || (a.description||'').toLowerCase().includes(sNom) || (a.structure||'').toLowerCase().includes(sNom);
      const matchVille = !sVille || (a.ville||'').toLowerCase().includes(sVille);
      return matchFilter && matchNom && matchVille;
    });
  }

  function renderAll() {
    markers.forEach(m => map.removeLayer(m.marker));
    markers = [];
    const filtered = getFiltered();
    filtered.forEach(a => {
      if (!a.latitude || !a.longitude) return;
      const premierMetier = (a.activites||[])[0] || 'Tous';
      const couleur = catColors[premierMetier] || '#4a7c59';
      const picto = getPicto(a.activites);
      const m = L.marker([a.latitude, a.longitude], { icon: createIcon(couleur, picto) }).addTo(map);
      m.bindPopup(`
        <div style="font-family:'Segoe UI',sans-serif;min-width:200px;padding:4px">
          <div style="font-weight:800;font-size:0.92rem;color:#2d5a3d;margin-bottom:3px">${a.structure||(a.prenom+' '+a.nom)}</div>
          <div style="font-size:0.78rem;color:#6b7280;margin-bottom:6px">📍 ${a.ville}${a.region?' · '+a.region:''}</div>
          <div style="font-size:0.8rem;margin-bottom:7px;line-height:1.5;color:#374151">${(a.description||'').substring(0,120)}${(a.description||'').length>120?'…':''}</div>
          ${a.recherche?`<div style="font-size:0.76rem;color:#6b7280;margin-bottom:6px;font-style:italic">🔍 Cherche : ${(a.recherche||'').substring(0,80)}${(a.recherche||'').length>80?'…':''}</div>`:''}
          ${a.site_web?`<a href="${a.site_web}" target="_blank" style="font-size:0.76rem;color:#4a7c59">🔗 Site web</a>`:''}
          <div style="margin-top:6px">${(a.activites||[]).map(ac=>`<span style="background:#eef4f0;color:#4a7c59;padding:2px 6px;border-radius:8px;font-size:0.68rem;font-weight:600;margin-right:2px;display:inline-block;margin-bottom:2px">${getPicto([ac])} ${ac}</span>`).join('')}</div>
        </div>
      `, { maxWidth: 260 });
      m.on('click', () => selectActeur(a.id));
      markers.push({ marker: m, id: a.id });
    });
    renderList(filtered);
  }

  function renderList(list) {
    const el = document.getElementById('acteurs-list');
    document.getElementById('count-badge').textContent = `${list.length} acteur${list.length>1?'s':''} dans l'annuaire`;
    if (list.length === 0) { el.innerHTML = '<div class="empty-state">Aucun résultat.</div>'; return; }
    el.innerHTML = list.map(a => {
      const premierMetier = (a.activites||[])[0] || 'Tous';
      const couleur = catColors[premierMetier] || '#4a7c59';
      const picto = getPicto(a.activites);
      return `<div class="acteur-card ${selectedId===a.id?'selected':''}" id="card-${a.id}" onclick="selectActeur('${a.id}')" style="border-left-color:${couleur}">
        <div class="acteur-name">${picto} ${a.structure||(a.prenom+' '+a.nom)}</div>
        <div class="acteur-meta">📍 ${a.ville}${a.region?' · '+a.region:''}</div>
        <div>${(a.activites||[]).map(ac=>`<span class="acteur-tag" style="background:${couleur}20;color:${couleur}">${ac}</span>`).join('')}</div>
        ${a.recherche?`<div style="font-size:0.72rem;color:var(--gris);margin-top:5px;font-style:italic">🔍 ${(a.recherche||'').substring(0,60)}${(a.recherche||'').length>60?'…':''}</div>`:''}
      </div>`;
    }).join('');
  }

  function selectActeur(id) {
    selectedId = id;
    const a = acteurs.find(x => x.id === id);
    if (a?.latitude && a?.longitude) {
      map.setView([a.latitude, a.longitude], 10, { animate: true });
      const m = markers.find(x => x.id === id);
      if (m) m.marker.openPopup();
    }
    renderList(getFiltered());
    document.getElementById('card-'+id)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function setFilter(cat) {
    activeFilter = cat;
    renderAll();
  }
</script>
</body>
</html>
